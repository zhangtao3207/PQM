<!DOCTYPE html>
<!--
  文件说明：
  这是当前 FPGA LCD 界面的浏览器预览稿，用于在修改 RTL 前快速确认布局、
  颜色、按钮、坐标系、参数区和波形展示方式。该文件不参与综合，仅作为
  Verilog 显示逻辑的等效参考。
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCD Preview</title>
  <style>
    :root {
      --page-bg: #09111c;
      --frame-bg: #0b1524;
      --frame-border: #28445f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #173b63 0%, transparent 35%),
        linear-gradient(180deg, #09111c 0%, #05080d 100%);
      font-family: Consolas, "Courier New", monospace;
      color: #f2f6fa;
    }

    .frame {
      padding: 18px;
      border: 1px solid var(--frame-border);
      background: rgba(11, 21, 36, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    canvas {
      width: min(100vw - 48px, 1000px);
      height: auto;
      display: block;
      background: var(--frame-bg);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="lcd" width="800" height="480"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("lcd");
    const ctx = canvas.getContext("2d");

    const C = {
      bg: "#0B1524",
      titleBg: "#173B63",
      panelBg: "#142235",
      panelDark: "#101A28",
      panelBorder: "#4F6D8F",
      graphBg: "#020406",
      graphGrid: "#243645",
      graphAxis: "#8EA7BF",
      graphYAxis: "#EAF3FF",
      textWhite: "#F2F6FA",
      textSoft: "#C6D3E2",
      textDim: "#95A9BE",
      buttonBg: "#49617E",
      buttonBgPressed: "#3D536D",
      buttonBorder: "#DEE9F5",
      waveU: "#39E46F",
      waveI: "#FFD84E",
      accent: "#58B6FF"
    };

    const L = {
      titleBarH: 44,
      leftX: 0,
      leftY: 64,
      leftW: 480,
      leftH: 392,
      rightX: 500,
      rightY: 64,
      rightW: 276,
      rightH: 392,
      dividerX: 486,
      dividerW: 4,
      graphX: 36,
      graphY: 144,
      graphW: 384,
      graphH: 240,
      graphCY: 264,
      plotTitleX: 68,
      plotTitleY: 72,
      axisLeftX: 40,
      axisRightX: 306,
      axisLabelY: 118,
      axisTick0X: 36,
      axisTick1X: 117,
      axisTick2X: 213,
      axisTick3X: 309,
      axisTick4X: 389,
      axisTickY: 392,
      axisTimeX: 336,
      axisTimeY: 416,
      voltageTickX: 2,
      currentTickX: 424,
      voltageTickY0: 134,
      voltageTickStep: 40,
      currentTickY0: 134,
      currentTickStep: 40,
      titleTextX: 32,
      titleTextY: 6,
      buttonX: 572,
      buttonY: 6,
      buttonW: 87,
      buttonH: 32,
      buttonTextX: 583,
      buttonTextY: 6,
      autoButtonX: 672,
      autoButtonY: 6,
      autoButtonW: 110,
      autoButtonH: 32,
      autoButtonTextX: 680,
      autoButtonTextY: 6,
      rightTitleX: 520,
      rightTitleY: 76,
      bottomMetricUX: 68,
      bottomMetricIX: 68,
      bottomMetricY: 425,
      lineX: 516,
      lineY0: 114,
      lineStep: 28
    };

    const M = {
      freqHz: 50,
      timeStart: -0.06,
      timeSpan: 0.06,
      analysisSamples: 4096,
      voltagePeakTarget: 11.0,
      currentPeakTarget: 0.50,
      voltageDisplayMax: 12.0,
      currentDisplayMax: 0.60
    };

    const UI = {
      freezeMinPressMs: 30,
      freezeMaxPressMs: 500
    };

    const state = {
      freezeActive: false,
      freezePressed: false,
      freezePointerId: null,
      freezePressStartMs: 0,
      animSec: 0,
      liveModel: null,
      frozenModel: null
    };

    function text(str, x, y, color, size = 28) {
      ctx.fillStyle = color;
      ctx.font = `${size}px Consolas, "Courier New", monospace`;
      ctx.textBaseline = "top";
      ctx.fillText(str, x, y);
    }

    function rect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function strokeRect(x, y, w, h, color, lineWidth = 1) {
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.strokeRect(x, y, w, h);
    }

    function inRect(x, y, rectX, rectY, rectW, rectH) {
      return x >= rectX && x < rectX + rectW && y >= rectY && y < rectY + rectH;
    }

    function isInFreezeButton(x, y) {
      return inRect(x, y, L.autoButtonX, L.autoButtonY, L.autoButtonW, L.autoButtonH);
    }

    function canvasPointFromEvent(event) {
      const bounds = canvas.getBoundingClientRect();
      return {
        x: ((event.clientX - bounds.left) * canvas.width) / bounds.width,
        y: ((event.clientY - bounds.top) * canvas.height) / bounds.height
      };
    }

    function drawButton(x, y, w, h, label, pressed) {
      rect(x, y, w, h, pressed ? C.buttonBgPressed : C.buttonBg);
      strokeRect(x + 0.5, y + 0.5, w - 1, h - 1, C.buttonBorder);
      ctx.fillStyle = C.textWhite;
      ctx.font = `28px Consolas, "Courier New", monospace`;
      ctx.textBaseline = "top";
      const textWidth = ctx.measureText(label).width;
      ctx.fillText(label, Math.round(x + (w - textWidth) / 2), y);
    }

    function drawGrid() {
      rect(L.graphX, L.graphY, L.graphW, L.graphH, C.graphBg);

      ctx.strokeStyle = C.graphGrid;
      ctx.lineWidth = 1;

      for (let x = L.graphX + 96; x < L.graphX + L.graphW - 1; x += 96) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, L.graphY + 1);
        ctx.lineTo(x + 0.5, L.graphY + L.graphH - 1);
        ctx.stroke();
      }

      for (let y = L.graphY + 40; y < L.graphY + L.graphH - 1; y += 40) {
        if (y === L.graphCY) continue;
        ctx.beginPath();
        ctx.moveTo(L.graphX + 1, y + 0.5);
        ctx.lineTo(L.graphX + L.graphW - 1, y + 0.5);
        ctx.stroke();
      }

      strokeRect(L.graphX + 0.5, L.graphY + 0.5, L.graphW - 1, L.graphH - 1, C.panelBorder, 1);

      ctx.strokeStyle = C.graphYAxis;
      ctx.beginPath();
      ctx.moveTo(L.graphX + 0.5, L.graphY + 1);
      ctx.lineTo(L.graphX + 0.5, L.graphY + L.graphH - 1);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(L.graphX + 1, L.graphCY + 0.5);
      ctx.lineTo(L.graphX + L.graphW - 1, L.graphCY + 0.5);
      ctx.stroke();

      ctx.strokeStyle = C.graphYAxis;
      ctx.beginPath();
      ctx.moveTo(L.graphX + L.graphW - 0.5, L.graphY + 1);
      ctx.lineTo(L.graphX + L.graphW - 0.5, L.graphY + L.graphH - 1);
      ctx.stroke();
    }

    function mean(values) {
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function rms(values) {
      return Math.sqrt(mean(values.map((value) => value * value)));
    }

    function peak(values) {
      let maxAbs = 0;
      for (const value of values) {
        const absValue = Math.abs(value);
        if (absValue > maxAbs) maxAbs = absValue;
      }
      return maxAbs;
    }

    function fundamentalPhase(samples, times, freqHz) {
      let re = 0;
      let im = 0;
      const omega = 2 * Math.PI * freqHz;

      for (let index = 0; index < samples.length; index += 1) {
        const angle = -omega * times[index];
        re += samples[index] * Math.cos(angle);
        im += samples[index] * Math.sin(angle);
      }

      return Math.atan2(im, re);
    }

    function normalizePhaseRad(phaseRad) {
      let wrapped = phaseRad;
      while (wrapped > Math.PI) wrapped -= 2 * Math.PI;
      while (wrapped < -Math.PI) wrapped += 2 * Math.PI;
      return wrapped;
    }

    function fmt(value, digits = 2) {
      return value.toFixed(digits);
    }

    function fmtSigned(value, digits = 2) {
      const sign = value >= 0 ? "+" : "-";
      return `${sign}${Math.abs(value).toFixed(digits)}`;
    }

    function voltageBase(t, freqHz) {
      return (
        Math.sin(2 * Math.PI * freqHz * t) +
        0.06 * Math.sin(2 * Math.PI * freqHz * 3 * t) +
        0.03 * Math.sin(2 * Math.PI * freqHz * 5 * t)
      );
    }

    function currentBase(t, freqHz, phaseLagRad) {
      return (
        0.62 * Math.sin(2 * Math.PI * freqHz * t - phaseLagRad) +
        0.05 * Math.sin(2 * Math.PI * freqHz * 3 * t - 0.15)
      );
    }

    function buildPreviewModel(animSec) {
      const freqHz = M.freqHz + 0.08 * Math.sin(animSec * 0.55);
      const voltagePeakTarget = M.voltagePeakTarget * (1 + 0.03 * Math.sin(animSec * 0.21));
      const currentPeakTarget = M.currentPeakTarget * (1 + 0.05 * Math.cos(animSec * 0.34));
      const phaseLagRad = 0.42 + 0.08 * Math.sin(animSec * 0.27);
      const timeStart = M.timeStart + animSec * 0.015;

      const times = Array.from({ length: M.analysisSamples }, (_, index) =>
        timeStart + (index / M.analysisSamples) * M.timeSpan
      );
      const voltageBaseSamples = times.map((t) => voltageBase(t, freqHz));
      const currentBaseSamples = times.map((t) => currentBase(t, freqHz, phaseLagRad));

      const voltageScale = voltagePeakTarget / peak(voltageBaseSamples);
      const currentScale = currentPeakTarget / peak(currentBaseSamples);

      const voltageSamples = voltageBaseSamples.map((value) => value * voltageScale);
      const currentSamples = currentBaseSamples.map((value) => value * currentScale);

      const voltageRms = rms(voltageSamples);
      const currentRms = rms(currentSamples);
      const activePower = mean(
        voltageSamples.map((value, index) => value * currentSamples[index])
      );
      const apparentPower = voltageRms * currentRms;
      const powerFactor = apparentPower > 1e-9 ? activePower / apparentPower : 0;

      const voltagePhase = fundamentalPhase(voltageSamples, times, freqHz);
      const currentPhase = fundamentalPhase(currentSamples, times, freqHz);
      const phaseDiffDeg =
        normalizePhaseRad(voltagePhase - currentPhase) * 180 / Math.PI;

      const reactivePowerMagnitude = Math.sqrt(
        Math.max(apparentPower * apparentPower - activePower * activePower, 0)
      );
      const reactivePower =
        Math.abs(phaseDiffDeg) < 1e-9 ? 0 : Math.sign(phaseDiffDeg) * reactivePowerMagnitude;

      const voltageP2P = Math.max(...voltageSamples) - Math.min(...voltageSamples);
      const currentP2P = Math.max(...currentSamples) - Math.min(...currentSamples);

      const top = L.graphY + 1;
      const bottom = L.graphY + L.graphH - 2;
      const mid = L.graphCY;
      const graphPoints = Array.from({ length: L.graphW }, (_, x) => {
        const t = timeStart + (x / (L.graphW - 1)) * M.timeSpan;
        const voltage = voltageBase(t, freqHz) * voltageScale;
        const current = currentBase(t, freqHz, phaseLagRad) * currentScale;

        const voltageY = Math.max(
          top,
          Math.min(bottom, mid - (voltage / M.voltageDisplayMax) * 98)
        );
        const currentY = Math.max(
          top,
          Math.min(bottom, mid - (current / M.currentDisplayMax) * 96)
        );

        return { x, voltageY, currentY };
      });

      return {
        frequencyHz: freqHz,
        voltageRms,
        currentRms,
        phaseDiffDeg,
        activePower,
        reactivePower,
        apparentPower,
        powerFactor,
        voltageP2P,
        currentP2P,
        graphPoints
      };
    }

    function drawWave(model) {
      ctx.strokeStyle = C.waveU;
      ctx.lineWidth = 2;
      ctx.beginPath();

      model.graphPoints.forEach((point, index) => {
        if (index === 0)
          ctx.moveTo(L.graphX + point.x + 0.5, point.voltageY + 0.5);
        else
          ctx.lineTo(L.graphX + point.x + 0.5, point.voltageY + 0.5);
      });

      ctx.stroke();

      ctx.strokeStyle = C.waveI;
      ctx.lineWidth = 2;
      ctx.beginPath();

      model.graphPoints.forEach((point, index) => {
        if (index === 0)
          ctx.moveTo(L.graphX + point.x + 0.5, point.currentY + 0.5);
        else
          ctx.lineTo(L.graphX + point.x + 0.5, point.currentY + 0.5);
      });

      ctx.stroke();
    }

    function drawRightPanel(model) {
      const lines = [
        { text: `Frequency: ${fmt(model.frequencyHz)} (Hz)`, color: C.textSoft },
        { text: `U_rms: ${fmt(model.voltageRms)} (V)`, color: C.waveU },
        { text: `I_rms: ${fmt(model.currentRms)} (A)`, color: C.waveI },
        { text: `Phase Diff: ${fmtSigned(model.phaseDiffDeg)} (deg)`, color: C.textWhite },
        { text: `Active P: ${fmt(model.activePower)} (W)`, color: C.accent },
        { text: `Reactive Q: ${fmtSigned(model.reactivePower)} (var)`, color: C.textSoft },
        { text: `Apparent S: ${fmt(model.apparentPower)} (VA)`, color: C.textWhite },
        { text: `Power Factor: ${fmt(model.powerFactor)}`, color: C.waveU }
      ];

      text("Parameters", L.rightTitleX, L.rightTitleY, C.accent, 24);

      lines.forEach((line, index) => {
        const y = L.lineY0 + index * L.lineStep;
        text(line.text, L.lineX, y, line.color, 20);

        if (index < lines.length - 1) {
          rect(L.rightX + 12, y + 24, L.rightW - 24, 1, "#243243");
        }
      });
    }

    function draw(model) {
      rect(0, 0, 800, 480, C.bg);

      rect(0, 0, 800, L.titleBarH, C.titleBg);
      rect(0, L.titleBarH - 1, 800, 1, C.accent);

      rect(L.rightX, L.rightY, L.rightW, L.rightH, C.panelDark);
      rect(L.dividerX, L.leftY, L.dividerW, L.leftH, C.panelBorder);

      strokeRect(L.rightX + 0.5, L.rightY + 0.5, L.rightW - 1, L.rightH - 1, C.panelBorder);

      drawButton(L.buttonX, L.buttonY, L.buttonW, L.buttonH, "MODE", false);
      drawButton(
        L.autoButtonX,
        L.autoButtonY,
        L.autoButtonW,
        L.autoButtonH,
        state.freezeActive ? "Auto" : "Freeze",
        state.freezePressed
      );

      drawGrid();
      drawWave(model);
      text("MODE: Single - Time", L.titleTextX, L.titleTextY, C.textWhite);
      text("Time Domain Analysis", L.plotTitleX, L.plotTitleY, C.textSoft);
      text("Voltage ( V)", L.axisLeftX, L.axisLabelY, C.waveU, 20);
      text("Current (A)", L.axisRightX, L.axisLabelY, C.waveI, 20);
      text("Time(ms)", L.axisTimeX, L.axisTimeY, C.textDim, 20);
      text(`Upp: ${fmt(model.voltageP2P)} (V)`, L.bottomMetricUX, L.bottomMetricY, C.waveU, 20);
      text(`Ipp: ${fmt(model.currentP2P)} (A)`, L.bottomMetricIX, L.bottomMetricY + 24, C.waveI, 20);

      ["+12", " +8", " +4", "  0", " -4", " -8", "-12"].forEach((label, index) => {
        text(label, L.voltageTickX, L.voltageTickY0 + index * L.voltageTickStep, C.waveU, 20);
      });

      ["+0.3", "+0.2", "+0.1", " 0.0", "-0.1", "-0.2", "-0.3"].forEach((label, index) => {
        text(label, L.currentTickX, L.currentTickY0 + index * L.currentTickStep, C.waveI, 20);
      });

      text("-60", L.axisTick0X, L.axisTickY, C.textDim, 20);
      text("-45", L.axisTick1X, L.axisTickY, C.textDim, 20);
      text("-30", L.axisTick2X, L.axisTickY, C.textDim, 20);
      text("-15", L.axisTick3X, L.axisTickY, C.textDim, 20);
      text("  0", L.axisTick4X, L.axisTickY, C.textDim, 20);

      drawRightPanel(model);
    }

    function toggleFreeze() {
      if (state.freezeActive) {
        state.freezeActive = false;
        state.frozenModel = null;
      } else {
        state.freezeActive = true;
        state.frozenModel = state.liveModel || buildPreviewModel(state.animSec);
      }
    }

    function finishFreezePress(event, cancelled = false) {
      if (state.freezePointerId !== event.pointerId) return;

      const point = canvasPointFromEvent(event);
      const durationMs = performance.now() - state.freezePressStartMs;
      const shouldToggle =
        !cancelled &&
        isInFreezeButton(point.x, point.y) &&
        durationMs >= UI.freezeMinPressMs &&
        durationMs <= UI.freezeMaxPressMs;

      state.freezePressed = false;
      state.freezePointerId = null;
      if (shouldToggle) toggleFreeze();
    }

    canvas.style.touchAction = "none";

    canvas.addEventListener("pointerdown", (event) => {
      const point = canvasPointFromEvent(event);
      if (!isInFreezeButton(point.x, point.y)) return;
      state.freezePointerId = event.pointerId;
      state.freezePressStartMs = performance.now();
      state.freezePressed = true;
      if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
      event.preventDefault();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (state.freezePointerId !== event.pointerId) return;
      const point = canvasPointFromEvent(event);
      state.freezePressed = isInFreezeButton(point.x, point.y);
    });

    canvas.addEventListener("pointerup", (event) => finishFreezePress(event, false));
    canvas.addEventListener("pointercancel", (event) => finishFreezePress(event, true));

    function animate(nowMs) {
      if (!state.freezeActive) {
        state.animSec = nowMs * 0.001;
        state.liveModel = buildPreviewModel(state.animSec);
      } else if (!state.frozenModel) {
        state.frozenModel = state.liveModel || buildPreviewModel(state.animSec);
      }

      draw(state.freezeActive ? state.frozenModel : state.liveModel);
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
