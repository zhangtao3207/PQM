<!DOCTYPE html>
<!--
  文件说明：
  这是当前 FPGA LCD 界面的浏览器预览稿，用于在修改 RTL 前快速确认布局、
  颜色、按钮、坐标系、参数区和波形展示方式。该文件不参与综合，仅作为
  Verilog 显示逻辑的等效参考。
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LCD Preview</title>
  <style>
    :root {
      --page-bg: #09111c;
      --frame-bg: #0b1524;
      --frame-border: #28445f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top, #173b63 0%, transparent 35%),
        linear-gradient(180deg, #09111c 0%, #05080d 100%);
      font-family: Consolas, "Courier New", monospace;
      color: #f2f6fa;
    }

    .frame {
      padding: 18px;
      border: 1px solid var(--frame-border);
      background: rgba(11, 21, 36, 0.92);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }

    canvas {
      width: min(100vw - 48px, 1000px);
      height: auto;
      display: block;
      background: var(--frame-bg);
      image-rendering: pixelated;
    }
  </style>
</head>
<body>
  <div class="frame">
    <canvas id="lcd" width="800" height="480"></canvas>
  </div>

  <script>
    const canvas = document.getElementById("lcd");
    const ctx = canvas.getContext("2d");

    const C = {
      bg: "#0B1524",
      titleBg: "#173B63",
      panelBg: "#142235",
      panelDark: "#101A28",
      panelBorder: "#4F6D8F",
      graphBg: "#020406",
      graphGrid: "#243645",
      graphAxis: "#8EA7BF",
      graphYAxis: "#EAF3FF",
      textWhite: "#F2F6FA",
      textSoft: "#C6D3E2",
      textDim: "#95A9BE",
      buttonBg: "#49617E",
      buttonBgPressed: "#3D536D",
      buttonBorder: "#DEE9F5",
      waveU: "#39E46F",
      waveI: "#FFD84E",
      accent: "#58B6FF"
    };

    const L = {
      titleBarH: 44,
      leftX: 0,
      leftY: 64,
      leftW: 480,
      leftH: 392,
      rightX: 500,
      rightY: 64,
      rightW: 276,
      rightH: 392,
      dividerX: 486,
      dividerW: 4,
      graphX: 66,
      graphY: 144,
      graphW: 354,
      graphH: 240,
      graphCY: 264,
      freqGraphX: 30,
      freqGraphW: 400,
      freqMagY: 144,
      freqMagH: 132,
      freqPhaseY: 304,
      freqPhaseH: 80,
      plotTitleX: 68,
      plotTitleY: 72,
      axisLeftX: 60,
      axisRightX: 306,
      axisLabelY: 118,
      axisTick0X: 66,
      axisTick1X: 140,
      axisTick2X: 229,
      axisTick3X: 317,
      axisTick4X: 389,
      axisTickY: 392,
      axisTimeX: 336,
      axisTimeY: 416,
      harmonicButtonY: 180,
      harmonicButtonW: 38,
      harmonicButtonH: 28,
      harmonicButtonGap: 50,
      voltageTickX: 2,
      currentTickX: 424,
      voltageTickY0: 134,
      voltageTickStep: 40,
      currentTickY0: 134,
      currentTickStep: 40,
      titleTextX: 32,
      titleTextY: 6,
      buttonX: 572,
      buttonY: 6,
      buttonW: 87,
      buttonH: 32,
      buttonTextX: 583,
      buttonTextY: 6,
      autoButtonX: 672,
      autoButtonY: 6,
      autoButtonW: 110,
      autoButtonH: 32,
      autoButtonTextX: 680,
      autoButtonTextY: 6,
      rightTitleX: 520,
      rightTitleY: 76,
      bottomMetricUX: 68,
      bottomMetricIX: 68,
      bottomMetricY: 425,
      lineX: 516,
      lineY0: 114,
      lineStep: 28
    };

    const M = {
      uFullScaleX100: 1000,
      iFullScaleX100: 300,
      freqHz: 50,
      timeStart: -0.06,
      timeSpan: 0.06,
      analysisSamples: 4096,
      voltagePeakTarget: 8.2,
      currentPeakTarget: 2.2
    };

    const UI = {
      freezeMinPressMs: 30,
      freezeMaxPressMs: 500,
      harmonicLongPressMs: 700,
      harmonicsPerPage: 25,
      harmonicMaxOrder: 500
    };

    const state = {
      frequencyPageActive: false,
      harmonicWindowIndex: 0,
      harmonicPagePressed: null,
      harmonicPagePressTarget: null,
      harmonicPagePointerId: null,
      harmonicPagePressStartMs: 0,
      modePressed: false,
      modePointerId: null,
      modePressStartMs: 0,
      freezeActive: false,
      freezePressed: false,
      freezePointerId: null,
      freezePressStartMs: 0,
      animSec: 0,
      liveModel: null,
      frozenModel: null
    };

    function text(str, x, y, color, size = 28) {
      ctx.fillStyle = color;
      ctx.font = `${size}px Consolas, "Courier New", monospace`;
      ctx.textBaseline = "top";
      ctx.fillText(str, x, y);
    }

    function rect(x, y, w, h, color) {
      ctx.fillStyle = color;
      ctx.fillRect(x, y, w, h);
    }

    function strokeRect(x, y, w, h, color, lineWidth = 1) {
      ctx.strokeStyle = color;
      ctx.lineWidth = lineWidth;
      ctx.strokeRect(x, y, w, h);
    }

    function inRect(x, y, rectX, rectY, rectW, rectH) {
      return x >= rectX && x < rectX + rectW && y >= rectY && y < rectY + rectH;
    }

    function isInFreezeButton(x, y) {
      return inRect(x, y, L.autoButtonX, L.autoButtonY, L.autoButtonW, L.autoButtonH);
    }

    function isInModeButton(x, y) {
      return inRect(x, y, L.buttonX, L.buttonY, L.buttonW, L.buttonH);
    }

    function harmonicButtonLayout() {
      const orderTextX = L.axisTimeX - 70;
      const leftX = 325;
      return {
        prevX: leftX,
        nextX: leftX + L.harmonicButtonGap,
        y: L.harmonicButtonY,
        w: L.harmonicButtonW,
        h: L.harmonicButtonH
      };
    }

    function harmonicButtonAt(x, y) {
      const layout = harmonicButtonLayout();
      if (inRect(x, y, layout.prevX, layout.y, layout.w, layout.h)) return "prev";
      if (inRect(x, y, layout.nextX, layout.y, layout.w, layout.h)) return "next";
      return null;
    }

    function canvasPointFromEvent(event) {
      const bounds = canvas.getBoundingClientRect();
      return {
        x: ((event.clientX - bounds.left) * canvas.width) / bounds.width,
        y: ((event.clientY - bounds.top) * canvas.height) / bounds.height
      };
    }

    function drawButton(x, y, w, h, label, pressed) {
      rect(x, y, w, h, pressed ? C.buttonBgPressed : C.buttonBg);
      strokeRect(x + 0.5, y + 0.5, w - 1, h - 1, C.buttonBorder);
      ctx.fillStyle = C.textWhite;
      ctx.font = `28px Consolas, "Courier New", monospace`;
      ctx.textBaseline = "top";
      const textWidth = ctx.measureText(label).width;
      ctx.fillText(label, Math.round(x + (w - textWidth) / 2), y);
    }

    function drawSmallButton(x, y, w, h, label, pressed) {
      rect(x, y, w, h, pressed ? C.buttonBgPressed : C.buttonBg);
      strokeRect(x + 0.5, y + 0.5, w - 1, h - 1, C.buttonBorder);
      ctx.fillStyle = C.textWhite;
      ctx.font = `24px Consolas, "Courier New", monospace`;
      ctx.textBaseline = "top";
      const textWidth = ctx.measureText(label).width;
      ctx.fillText(label, Math.round(x + (w - textWidth) / 2), y - 1);
    }

    function drawGrid() {
      rect(L.graphX, L.graphY, L.graphW, L.graphH, C.graphBg);

      ctx.strokeStyle = C.graphGrid;
      ctx.lineWidth = 1;

      for (let x = L.graphX + 96; x < L.graphX + L.graphW - 1; x += 96) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, L.graphY + 1);
        ctx.lineTo(x + 0.5, L.graphY + L.graphH - 1);
        ctx.stroke();
      }

      for (let y = L.graphY + 40; y < L.graphY + L.graphH - 1; y += 40) {
        if (y === L.graphCY) continue;
        ctx.beginPath();
        ctx.moveTo(L.graphX + 1, y + 0.5);
        ctx.lineTo(L.graphX + L.graphW - 1, y + 0.5);
        ctx.stroke();
      }

      strokeRect(L.graphX + 0.5, L.graphY + 0.5, L.graphW - 1, L.graphH - 1, C.panelBorder, 1);

      ctx.strokeStyle = C.graphYAxis;
      ctx.beginPath();
      ctx.moveTo(L.graphX + 0.5, L.graphY + 1);
      ctx.lineTo(L.graphX + 0.5, L.graphY + L.graphH - 1);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(L.graphX + 1, L.graphCY + 0.5);
      ctx.lineTo(L.graphX + L.graphW - 1, L.graphCY + 0.5);
      ctx.stroke();

      ctx.strokeStyle = C.graphYAxis;
      ctx.beginPath();
      ctx.moveTo(L.graphX + L.graphW - 0.5, L.graphY + 1);
      ctx.lineTo(L.graphX + L.graphW - 0.5, L.graphY + L.graphH - 1);
      ctx.stroke();
    }

    function mean(values) {
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function rms(values) {
      return Math.sqrt(mean(values.map((value) => value * value)));
    }

    function peak(values) {
      let maxAbs = 0;
      for (const value of values) {
        const absValue = Math.abs(value);
        if (absValue > maxAbs) maxAbs = absValue;
      }
      return maxAbs;
    }

    function fundamentalPhase(samples, times, freqHz) {
      let re = 0;
      let im = 0;
      const omega = 2 * Math.PI * freqHz;

      for (let index = 0; index < samples.length; index += 1) {
        const angle = -omega * times[index];
        re += samples[index] * Math.cos(angle);
        im += samples[index] * Math.sin(angle);
      }

      return Math.atan2(im, re);
    }

    function normalizePhaseRad(phaseRad) {
      let wrapped = phaseRad;
      while (wrapped > Math.PI) wrapped -= 2 * Math.PI;
      while (wrapped < -Math.PI) wrapped += 2 * Math.PI;
      return wrapped;
    }

    function fmt(value, digits = 2) {
      return value.toFixed(digits);
    }

    function fmtSigned(value, digits = 2) {
      const sign = value >= 0 ? "+" : "-";
      return `${sign}${Math.abs(value).toFixed(digits)}`;
    }

    function x100ToFloat(valueX100) {
      return valueX100 / 100;
    }

    function tickLabelsFromFullScale(fullScaleX100) {
      const full = x100ToFloat(fullScaleX100);
      return [full, full * 2 / 3, full / 3, 0, -full / 3, -full * 2 / 3, -full]
        .map((value) => {
          const sign = value > 0 ? "+" : value < 0 ? "-" : " ";
          return `${sign}${Math.abs(value).toFixed(1).padStart(4, " ")}`;
        });
    }

    function voltageBase(t, freqHz) {
      return (
        Math.sin(2 * Math.PI * freqHz * t) +
        0.06 * Math.sin(2 * Math.PI * freqHz * 3 * t) +
        0.03 * Math.sin(2 * Math.PI * freqHz * 5 * t)
      );
    }

    function currentBase(t, freqHz, phaseLagRad) {
      return (
        0.62 * Math.sin(2 * Math.PI * freqHz * t - phaseLagRad) +
        0.05 * Math.sin(2 * Math.PI * freqHz * 3 * t - 0.15)
      );
    }

    function buildPreviewModel(animSec) {
      const freqHz = M.freqHz + 0.08 * Math.sin(animSec * 0.55);
      const voltagePeakTarget = M.voltagePeakTarget * (1 + 0.03 * Math.sin(animSec * 0.21));
      const currentPeakTarget = M.currentPeakTarget * (1 + 0.05 * Math.cos(animSec * 0.34));
      const phaseLagRad = 0.42 + 0.08 * Math.sin(animSec * 0.27);
      const timeStart = M.timeStart + animSec * 0.015;

      const times = Array.from({ length: M.analysisSamples }, (_, index) =>
        timeStart + (index / M.analysisSamples) * M.timeSpan
      );
      const voltageBaseSamples = times.map((t) => voltageBase(t, freqHz));
      const currentBaseSamples = times.map((t) => currentBase(t, freqHz, phaseLagRad));

      const voltageScale = voltagePeakTarget / peak(voltageBaseSamples);
      const currentScale = currentPeakTarget / peak(currentBaseSamples);

      const voltageSamples = voltageBaseSamples.map((value) => value * voltageScale);
      const currentSamples = currentBaseSamples.map((value) => value * currentScale);

      const voltageRms = rms(voltageSamples);
      const currentRms = rms(currentSamples);
      const activePower = mean(
        voltageSamples.map((value, index) => value * currentSamples[index])
      );
      const apparentPower = voltageRms * currentRms;
      const powerFactor = apparentPower > 1e-9 ? activePower / apparentPower : 0;

      const voltagePhase = fundamentalPhase(voltageSamples, times, freqHz);
      const currentPhase = fundamentalPhase(currentSamples, times, freqHz);
      const phaseDiffDeg =
        normalizePhaseRad(voltagePhase - currentPhase) * 180 / Math.PI;

      const reactivePowerMagnitude = Math.sqrt(
        Math.max(apparentPower * apparentPower - activePower * activePower, 0)
      );
      const reactivePower =
        Math.abs(phaseDiffDeg) < 1e-9 ? 0 : Math.sign(phaseDiffDeg) * reactivePowerMagnitude;

      const voltageP2P = Math.max(...voltageSamples) - Math.min(...voltageSamples);
      const currentP2P = Math.max(...currentSamples) - Math.min(...currentSamples);

      const top = L.graphY + 1;
      const bottom = L.graphY + L.graphH - 2;
      const mid = L.graphCY;
      const graphFullScalePx = L.graphH / 2 - 2;
      const voltageDisplayMax = x100ToFloat(M.uFullScaleX100);
      const currentDisplayMax = x100ToFloat(M.iFullScaleX100);
      const graphPoints = Array.from({ length: L.graphW }, (_, x) => {
        const t = timeStart + (x / (L.graphW - 1)) * M.timeSpan;
        const voltage = voltageBase(t, freqHz) * voltageScale;
        const current = currentBase(t, freqHz, phaseLagRad) * currentScale;

        const voltageY = Math.max(
          top,
          Math.min(bottom, mid - (voltage / voltageDisplayMax) * graphFullScalePx)
        );
        const currentY = Math.max(
          top,
          Math.min(bottom, mid - (current / currentDisplayMax) * graphFullScalePx)
        );

        return { x, voltageY, currentY };
      });

      return {
        frequencyHz: freqHz,
        voltageRms,
        currentRms,
        phaseDiffDeg,
        activePower,
        reactivePower,
        apparentPower,
        powerFactor,
        voltageP2P,
        currentP2P,
        graphPoints
      };
    }

    function drawWave(model) {
      ctx.strokeStyle = C.waveU;
      ctx.lineWidth = 2;
      ctx.beginPath();

      model.graphPoints.forEach((point, index) => {
        if (index === 0)
          ctx.moveTo(L.graphX + point.x + 0.5, point.voltageY + 0.5);
        else
          ctx.lineTo(L.graphX + point.x + 0.5, point.voltageY + 0.5);
      });

      ctx.stroke();

      ctx.strokeStyle = C.waveI;
      ctx.lineWidth = 2;
      ctx.beginPath();

      model.graphPoints.forEach((point, index) => {
        if (index === 0)
          ctx.moveTo(L.graphX + point.x + 0.5, point.currentY + 0.5);
        else
          ctx.lineTo(L.graphX + point.x + 0.5, point.currentY + 0.5);
      });

      ctx.stroke();
    }

    function drawFrequencyGrid() {
      rect(L.freqGraphX, L.freqMagY, L.freqGraphW, L.freqMagH, C.graphBg);
      rect(L.freqGraphX, L.freqPhaseY, L.freqGraphW, L.freqPhaseH, C.graphBg);

      ctx.strokeStyle = C.graphGrid;
      ctx.lineWidth = 1;

      for (let x = L.freqGraphX + 53; x < L.freqGraphX + L.freqGraphW - 1; x += 53) {
        ctx.beginPath();
        ctx.moveTo(x + 0.5, L.freqMagY + 1);
        ctx.lineTo(x + 0.5, L.freqMagY + L.freqMagH - 1);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(x + 0.5, L.freqPhaseY + 1);
        ctx.lineTo(x + 0.5, L.freqPhaseY + L.freqPhaseH - 1);
        ctx.stroke();
      }

      for (let y = L.freqMagY + 26; y < L.freqMagY + L.freqMagH - 1; y += 26) {
        ctx.beginPath();
        ctx.moveTo(L.freqGraphX + 1, y + 0.5);
        ctx.lineTo(L.freqGraphX + L.freqGraphW - 1, y + 0.5);
        ctx.stroke();
      }

      const phaseMidY = L.freqPhaseY + Math.round(L.freqPhaseH / 2);
      ctx.strokeStyle = C.graphYAxis;
      ctx.beginPath();
      ctx.moveTo(L.freqGraphX + 1, phaseMidY + 0.5);
      ctx.lineTo(L.freqGraphX + L.freqGraphW - 1, phaseMidY + 0.5);
      ctx.stroke();

      strokeRect(L.freqGraphX + 0.5, L.freqMagY + 0.5, L.freqGraphW - 1, L.freqMagH - 1, C.panelBorder, 1);
      strokeRect(L.freqGraphX + 0.5, L.freqPhaseY + 0.5, L.freqGraphW - 1, L.freqPhaseH - 1, C.panelBorder, 1);
    }

    function buildHarmonicBins(model) {
      const firstHarmonic = state.harmonicWindowIndex * UI.harmonicsPerPage + 1;
      const harmonicCount = Math.min(
        UI.harmonicsPerPage,
        UI.harmonicMaxOrder - firstHarmonic + 1
      );
      const uFundamental = model.voltageRms * Math.SQRT2;
      const iFundamental = model.currentRms * Math.SQRT2;
      const bins = [
        ...(state.harmonicWindowIndex === 0 ? [{ harmonic: 0, hz: 0, uMag: 0.18, iMag: 0.05 }] : []),
        ...Array.from({ length: harmonicCount }, (_, index) => {
          const harmonic = firstHarmonic + index;
          const isFundamental = harmonic === 1;
          const harmonicDecay = 0.18 / Math.sqrt(harmonic);
          const thirdBoost = harmonic === 3 ? 0.08 : 0;
          const fifthBoost = harmonic === 5 ? 0.05 : 0;
          const uRelative = isFundamental ? 1.00 : harmonicDecay + thirdBoost + fifthBoost;
          const iRelative = isFundamental ? 1.00 : harmonicDecay * 0.75 + thirdBoost * 0.8;

          return {
            harmonic,
            hz: harmonic * 50,
            uMag: uFundamental * uRelative,
            iMag: iFundamental * iRelative,
            phaseDiffDeg: normalizePhaseRad((model.phaseDiffDeg + 18 * Math.sin(harmonic * 0.7)) * Math.PI / 180) * 180 / Math.PI
          };
        })
      ];
      return bins;
    }

    function drawSpectrumBars(model) {
      const uFullScale = x100ToFloat(M.uFullScaleX100);
      const iFullScale = x100ToFloat(M.iFullScaleX100);
      const firstHarmonic = state.harmonicWindowIndex * UI.harmonicsPerPage + 1;
      const bins = buildHarmonicBins(model);
      const baseY = L.freqMagY + L.freqMagH - 2;
      const barW = 4;
      const firstBarX = L.freqGraphX + 8;
      const lastBarX = L.freqGraphX + L.freqGraphW - 28;
      const binStep = (lastBarX - firstBarX) / (bins.length - 1);
      const scale = L.freqMagH - 16;

      bins.forEach((bin, index) => {
        const x = firstBarX + index * binStep;
        const uPercent = Math.min(100, (bin.uMag / uFullScale) * 100);
        const iPercent = Math.min(100, (bin.iMag / iFullScale) * 100);
        const uH = Math.round((uPercent / 100) * scale);
        const iH = Math.round((iPercent / 100) * scale);

        rect(x, baseY - uH, barW, uH, C.waveU);
        rect(x + 5, baseY - iH, barW, iH, C.waveI);

        if (
          bin.harmonic === 0 ||
          bin.harmonic === firstHarmonic ||
          bin.harmonic === UI.harmonicMaxOrder ||
          (state.harmonicWindowIndex === 0 && index > 0 && index % 5 === 0) ||
          (state.harmonicWindowIndex > 0 && (index + 1) % 5 === 0)
        )
          text(bin.harmonic === 0 ? "0" : String(bin.harmonic), x - 4, L.axisTickY, C.textDim, 16);
      });


      text("U", L.freqGraphX + L.freqGraphW - 58, L.freqMagY + 8, C.waveU, 18);
      text("I", L.freqGraphX + L.freqGraphW - 30, L.freqMagY + 8, C.waveI, 18);
      rect(L.freqGraphX + L.freqGraphW - 76, L.freqMagY + 14, 14, 4, C.waveU);
      rect(L.freqGraphX + L.freqGraphW - 48, L.freqMagY + 14, 14, 4, C.waveI);
    }

    function drawPhaseDiffBars(model) {
      const bins = buildHarmonicBins(model);
      const phaseMidY = L.freqPhaseY + Math.round(L.freqPhaseH / 2);
      const firstBarX = L.freqGraphX + 8;
      const lastBarX = L.freqGraphX + L.freqGraphW - 28;
      const binStep = (lastBarX - firstBarX) / (bins.length - 1);
      const barW = 7;
      const scale = (L.freqPhaseH / 2) - 4;

      bins.forEach((bin, index) => {
        if (bin.harmonic === 0) return;

        const x = firstBarX + index * binStep;
        const phase = Math.max(-180, Math.min(180, bin.phaseDiffDeg));
        const h = Math.round((Math.abs(phase) / 180) * scale);

        if (phase >= 0)
          rect(x, phaseMidY - h, barW, h, C.accent);
        else
          rect(x, phaseMidY, barW, h, C.accent);
      });
    }

    function drawFrequencyYAxis() {
      const labels = ["100", "80", "60", "40", "20", "0"];

      labels.forEach((label, index) => {
        const y = L.freqMagY + index * ((L.freqMagH - 2) / 5);
        text(label, L.freqGraphX - 22, y - 8, C.textDim, 16);
      });

      text("+180", L.freqGraphX - 30, L.freqPhaseY - 7, C.textDim, 14);
      text("0", L.freqGraphX - 12, L.freqPhaseY + Math.round(L.freqPhaseH / 2) - 8, C.textDim, 14);
      text("-180", L.freqGraphX - 30, L.freqPhaseY + L.freqPhaseH - 14, C.textDim, 14);
    }

    function drawHarmonicPageButtons() {
      const layout = harmonicButtonLayout();

      drawSmallButton(
        layout.prevX,
        layout.y,
        layout.w,
        layout.h,
        "<",
        state.harmonicPagePressed === "prev"
      );
      drawSmallButton(
        layout.nextX,
        layout.y,
        layout.w,
        layout.h,
        ">",
        state.harmonicPagePressed === "next"
      );
    }

    function drawRightPanel(model) {
      const lines = [
        { text: `Frequency: ${fmt(model.frequencyHz)} (Hz)`, color: C.textSoft },
        { text: `U_rms: ${fmt(model.voltageRms)} (V)`, color: C.waveU },
        { text: `I_rms: ${fmt(model.currentRms)} (A)`, color: C.waveI },
        { text: `Phase Diff: ${fmtSigned(model.phaseDiffDeg)} (deg)`, color: C.textWhite },
        { text: `Active P: ${fmt(model.activePower)} (W)`, color: C.accent },
        { text: `Reactive Q: ${fmtSigned(model.reactivePower)} (var)`, color: C.textSoft },
        { text: `Apparent S: ${fmt(model.apparentPower)} (VA)`, color: C.textWhite },
        { text: `Power Factor: ${fmt(model.powerFactor)}`, color: C.waveU }
      ];

      text("Parameters", L.rightTitleX, L.rightTitleY, C.accent, 24);

      lines.forEach((line, index) => {
        const y = L.lineY0 + index * L.lineStep;
        text(line.text, L.lineX, y, line.color, 20);

        if (index < lines.length - 1) {
          rect(L.rightX + 12, y + 24, L.rightW - 24, 1, "#243243");
        }
      });
    }

    function drawShell() {
      rect(0, 0, 800, 480, C.bg);

      rect(0, 0, 800, L.titleBarH, C.titleBg);
      rect(0, L.titleBarH - 1, 800, 1, C.accent);

      rect(L.rightX, L.rightY, L.rightW, L.rightH, C.panelDark);
      rect(L.dividerX, L.leftY, L.dividerW, L.leftH, C.panelBorder);

      strokeRect(L.rightX + 0.5, L.rightY + 0.5, L.rightW - 1, L.rightH - 1, C.panelBorder);

      drawButton(L.buttonX, L.buttonY, L.buttonW, L.buttonH, "MODE", state.modePressed);
      drawButton(
        L.autoButtonX,
        L.autoButtonY,
        L.autoButtonW,
        L.autoButtonH,
        state.freezeActive ? "Auto" : "Freeze",
        state.freezePressed
      );
    }

    function drawTimePage(model) {
      drawShell();
      drawGrid();
      drawWave(model);
      text("MODE: Single - Time", L.titleTextX, L.titleTextY, C.textWhite);
      text("Time Domain Analysis", L.plotTitleX, L.plotTitleY, C.textSoft);
      text("Voltage ( V)", L.axisLeftX, L.axisLabelY, C.waveU, 20);
      text("Current (A)", L.axisRightX, L.axisLabelY, C.waveI, 20);
      text("Time(ms)", L.axisTimeX, L.axisTimeY, C.textDim, 20);
      text(`Upp: ${fmt(model.voltageP2P)} (V)`, L.bottomMetricUX, L.bottomMetricY, C.waveU, 20);
      text(`Ipp: ${fmt(model.currentP2P)} (A)`, L.bottomMetricIX, L.bottomMetricY + 24, C.waveI, 20);

      tickLabelsFromFullScale(M.uFullScaleX100).forEach((label, index) => {
        text(label, L.voltageTickX, L.voltageTickY0 + index * L.voltageTickStep, C.waveU, 20);
      });

      tickLabelsFromFullScale(M.iFullScaleX100).forEach((label, index) => {
        text(label, L.currentTickX, L.currentTickY0 + index * L.currentTickStep, C.waveI, 20);
      });

      text("-60", L.axisTick0X, L.axisTickY, C.textDim, 20);
      text("-45", L.axisTick1X, L.axisTickY, C.textDim, 20);
      text("-30", L.axisTick2X, L.axisTickY, C.textDim, 20);
      text("-15", L.axisTick3X, L.axisTickY, C.textDim, 20);
      text("  0", L.axisTick4X, L.axisTickY, C.textDim, 20);

      drawRightPanel(model);
    }

    function drawFrequencyPage(model) {
      drawShell();
      drawFrequencyGrid();
      drawSpectrumBars(model);
      drawPhaseDiffBars(model);
      drawFrequencyYAxis();
      drawHarmonicPageButtons();

      text("MODE: Single - Frequency", L.titleTextX, L.titleTextY, C.textWhite);
      text("Freq Domain Analysis", L.plotTitleX, L.plotTitleY, C.textSoft);
      text("Magnitude (%)", L.freqGraphX, L.axisLabelY, C.waveU, 20);
      text("Phase Diff (deg)", L.freqGraphX, L.freqPhaseY +110, C.accent, 18);
      text("Harmonic Order", L.axisTimeX - 70, L.axisTimeY, C.textDim, 20);

      text("Parameters", L.rightTitleX, L.rightTitleY, C.accent, 24);
      const lines = [
        { text: `Fundamental: ${fmt(model.frequencyHz)} (Hz)`, color: C.textSoft },
        { text: `U1 Mag: ${fmt(model.voltageRms * Math.SQRT2)} (V)`, color: C.waveU },
        { text: `I1 Mag: ${fmt(model.currentRms * Math.SQRT2)} (A)`, color: C.waveI },
        { text: `THD-U: 7.84 (%)`, color: C.waveU },
        { text: `THD-I: 6.12 (%)`, color: C.waveI },
        { text: `Dominant H: 3rd`, color: C.textWhite }
      ];

      lines.forEach((line, index) => {
        const y = L.lineY0 + index * L.lineStep;
        text(line.text, L.lineX, y, line.color, 20);

        if (index < lines.length - 1) {
          rect(L.rightX + 12, y + 24, L.rightW - 24, 1, "#243243");
        }
      });
    }

    function draw(model) {
      if (state.frequencyPageActive)
        drawFrequencyPage(model);
      else
        drawTimePage(model);
    }

    function toggleMode() {
      state.frequencyPageActive = !state.frequencyPageActive;
    }

    function stepHarmonicWindow(direction) {
      const maxWindowIndex = Math.ceil(UI.harmonicMaxOrder / UI.harmonicsPerPage) - 1;

      if (direction === "prev") {
        if (state.harmonicWindowIndex > 0)
          state.harmonicWindowIndex -= 1;
      } else {
        if (state.harmonicWindowIndex < maxWindowIndex)
          state.harmonicWindowIndex += 1;
      }
    }

    function toggleFreeze() {
      if (state.freezeActive) {
        state.freezeActive = false;
        state.frozenModel = null;
      } else {
        state.freezeActive = true;
        state.frozenModel = state.liveModel || buildPreviewModel(state.animSec);
      }
    }

    function finishModePress(event, cancelled = false) {
      if (state.modePointerId !== event.pointerId) return;

      const point = canvasPointFromEvent(event);
      const durationMs = performance.now() - state.modePressStartMs;
      const shouldToggle =
        !cancelled &&
        isInModeButton(point.x, point.y) &&
        durationMs >= UI.freezeMinPressMs &&
        durationMs <= UI.freezeMaxPressMs;

      state.modePressed = false;
      state.modePointerId = null;
      if (shouldToggle) toggleMode();
    }

    function finishFreezePress(event, cancelled = false) {
      if (state.freezePointerId !== event.pointerId) return;

      const point = canvasPointFromEvent(event);
      const durationMs = performance.now() - state.freezePressStartMs;
      const shouldToggle =
        !cancelled &&
        isInFreezeButton(point.x, point.y) &&
        durationMs >= UI.freezeMinPressMs &&
        durationMs <= UI.freezeMaxPressMs;

      state.freezePressed = false;
      state.freezePointerId = null;
      if (shouldToggle) toggleFreeze();
    }

    function finishHarmonicPagePress(event, cancelled = false) {
      if (state.harmonicPagePointerId !== event.pointerId) return;

      const point = canvasPointFromEvent(event);
      const pressedButton = state.harmonicPagePressTarget;
      const releaseButton = harmonicButtonAt(point.x, point.y);
      const durationMs = performance.now() - state.harmonicPagePressStartMs;
      const shouldReturnHome =
        !cancelled &&
        state.frequencyPageActive &&
        pressedButton === "prev" &&
        releaseButton === "prev" &&
        durationMs >= UI.harmonicLongPressMs;
      const shouldStep =
        !cancelled &&
        state.frequencyPageActive &&
        pressedButton &&
        pressedButton === releaseButton &&
        durationMs >= UI.freezeMinPressMs &&
        durationMs <= UI.freezeMaxPressMs;

      state.harmonicPagePressed = null;
      state.harmonicPagePressTarget = null;
      state.harmonicPagePointerId = null;
      if (shouldReturnHome)
        state.harmonicWindowIndex = 0;
      else if (shouldStep)
        stepHarmonicWindow(pressedButton);
    }

    canvas.style.touchAction = "none";

    canvas.addEventListener("pointerdown", (event) => {
      const point = canvasPointFromEvent(event);
      const harmonicButton = state.frequencyPageActive ? harmonicButtonAt(point.x, point.y) : null;
      if (harmonicButton) {
        state.harmonicPagePointerId = event.pointerId;
        state.harmonicPagePressStartMs = performance.now();
        state.harmonicPagePressed = harmonicButton;
        state.harmonicPagePressTarget = harmonicButton;
        if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
        event.preventDefault();
        return;
      }

      if (isInModeButton(point.x, point.y)) {
        state.modePointerId = event.pointerId;
        state.modePressStartMs = performance.now();
        state.modePressed = true;
        if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
        event.preventDefault();
        return;
      }

      if (!isInFreezeButton(point.x, point.y)) return;
      state.freezePointerId = event.pointerId;
      state.freezePressStartMs = performance.now();
      state.freezePressed = true;
      if (canvas.setPointerCapture) canvas.setPointerCapture(event.pointerId);
      event.preventDefault();
    });

    canvas.addEventListener("pointermove", (event) => {
      if (state.harmonicPagePointerId === event.pointerId) {
        const point = canvasPointFromEvent(event);
        const button = harmonicButtonAt(point.x, point.y);
        state.harmonicPagePressed = button === state.harmonicPagePressTarget ? button : null;
        return;
      }

      if (state.modePointerId === event.pointerId) {
        const point = canvasPointFromEvent(event);
        state.modePressed = isInModeButton(point.x, point.y);
        return;
      }

      if (state.freezePointerId !== event.pointerId) return;
      const point = canvasPointFromEvent(event);
      state.freezePressed = isInFreezeButton(point.x, point.y);
    });

    canvas.addEventListener("pointerup", (event) => {
      finishHarmonicPagePress(event, false);
      finishModePress(event, false);
      finishFreezePress(event, false);
    });
    canvas.addEventListener("pointercancel", (event) => {
      finishHarmonicPagePress(event, true);
      finishModePress(event, true);
      finishFreezePress(event, true);
    });

    function animate(nowMs) {
      if (!state.freezeActive) {
        state.animSec = nowMs * 0.001;
        state.liveModel = buildPreviewModel(state.animSec);
      } else if (!state.frozenModel) {
        state.frozenModel = state.liveModel || buildPreviewModel(state.animSec);
      }

      draw(state.freezeActive ? state.frozenModel : state.liveModel);
      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
